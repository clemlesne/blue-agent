name: Root support

parameters:
  - name: flavor
    type: string
  - name: version
    type: string

jobs:
  - job: test
    pool:
      name: github-actions
      demands:
        - flavor_${{ parameters.flavor }}
        - version_${{ parameters.version }}
    steps:
      - bash: |
          sudo -n true
        displayName: Test sudo access

      - bash: |
          if command -v apt-get &> /dev/null; then
            echo "Using apt-get..."
            sudo apt-get update
            sudo apt-get install -y python3-pip
          elif command -v microdnf &> /dev/null; then
            echo "Using microdnf..."
            sudo microdnf install -y python3.11-pip
          elif command -v tdnf &> /dev/null; then
            echo "Using tdnf..."
            sudo tdnf update -y
            sudo tdnf install -y python3.11-pip
          else
            echo "No suported package manager"
            exit 1
          fi
        displayName: Test package installation
